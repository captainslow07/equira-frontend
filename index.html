<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Equira Labs | Trustworthy AI</title>
        <style>
            :root {
                --accent: #38bdf8;
                --bg: #030712;
            }
            body {
                margin: 0;
                background-color: var(--bg);
                color: white;
                font-family: "Inter", system-ui, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }
            .card {
                text-align: center;
                padding: 4rem 2rem;
                border-radius: 1.5rem;
                background: linear-gradient(
                    145deg,
                    rgba(255, 255, 255, 0.03) 0%,
                    rgba(255, 255, 255, 0.01) 100%
                );
                border: 1px solid rgba(255, 255, 255, 0.08);
                backdrop-filter: blur(12px);
                max-width: 650px;
                width: 90%;
                transition: all 0.5s ease;
            }
            .logo,
            .mission,
            .tagline {
                transition: all 0.5s ease;
            }
            .card.active-state .logo,
            .card.active-state .mission,
            .card.active-state .tagline {
                opacity: 0.3;
                transform: scale(0.95);
            }
            .logo {
                max-width: 120px;
                margin-bottom: 2.5rem;
                filter: drop-shadow(0 0 20px rgba(56, 189, 248, 0.15));
            }
            .tagline {
                text-transform: uppercase;
                letter-spacing: 0.4em;
                font-size: 0.7rem;
                color: var(--accent);
                font-weight: 700;
                margin-bottom: 1.5rem;
                display: block;
            }
            h1 {
                font-size: 2.5rem;
                margin: 0;
                letter-spacing: -0.02em;
                background: linear-gradient(to bottom, #fff 50%, #94a3b8);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            .mission {
                color: #94a3b8;
                line-height: 1.8;
                margin-top: 2rem;
                font-size: 1.1rem;
                font-weight: 400;
                text-align: center;
            }
            .highlight {
                color: white;
                font-weight: 500;
            }
            .footer-tag {
                margin-top: 3rem;
                font-family: monospace;
                font-size: 0.75rem;
                color: #475569;
            }
            .upload-btn {
                margin-top: 2rem;
                padding: 0.75rem 1.5rem;
                background: transparent;
                border: 1px solid var(--accent);
                color: var(--accent);
                border-radius: 0.5rem;
                cursor: pointer;
                font-family: inherit;
                font-size: 0.9rem;
                transition: all 0.2s;
            }
            .upload-btn:hover {
                background: var(--accent);
                color: var(--bg);
            }
            #statusArea {
                margin-top: 2rem;
                color: white;
                font-size: 1.2rem;
                font-weight: 500;
                min-height: 1.5em;
            }
        </style>
    </head>
    <body>
        <div class="card" id="mainCard">
            <span class="tagline">Governance that disappears</span>
            <img src="assets/logo.svg" alt="Equira Labs Logo" class="logo" />
            <h1>Equira Labs</h1>

            <p class="mission">
                Our mission is to make powerful AI systems
                <span class="highlight">trustworthy by design</span>—aligning
                them with human intent through invisible, scalable governance
                that enables confident adoption across enterprises and society.
            </p>

            <button class="upload-btn" id="uploadBtn">Try it Out!</button>
            <input
                type="file"
                id="fileInput"
                style="display: none"
                accept="image/*,video/*"
            />

            <div id="statusArea"></div>

            <div class="footer-tag">// SECURING_THE_SYNTHETIC_FRONTIER</div>
        </div>

        <script>
            const uploadBtn = document.getElementById("uploadBtn");
            const fileInput = document.getElementById("fileInput");
            const statusArea = document.getElementById("statusArea");
            const mainCard = document.getElementById("mainCard");

            uploadBtn.addEventListener("click", () => fileInput.click());

            fileInput.addEventListener("change", async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setState("UPLOADING", "Starting upload...");

                try {
                    await mockUpload(file);
                    setState("PROCESSING", "Analyzing your content...");
                    const guid = await mockProcessing();
                    await pollResults(guid);
                } catch (err) {
                    setState("IDLE", "Error: " + err.message);
                }
            });

            function setState(newState, message) {
                statusArea.innerText = message;

                if (newState !== "IDLE") {
                    mainCard.classList.add("active-state");
                    uploadBtn.style.display = "none";
                } else {
                    mainCard.classList.remove("active-state");
                    uploadBtn.style.display = "block";
                }
            }

            async function mockUpload(file) {
                return new Promise((resolve) => setTimeout(resolve, 2000));
            }
            async function mockProcessing() {
                return "guid-12345";
            }
            async function pollResults(guid) {
                statusArea.innerText = `Processing: ${guid} (Checking...)`;
                await new Promise((resolve) => setTimeout(resolve, 2000));
                setState(
                    "COMPLETED",
                    "Analysis Complete: Your content is safe.",
                );
            }
        </script>
    </body>
</html>
