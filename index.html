<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Equira Labs | Trustworthy AI</title>
        <style>
            :root {
                --accent: #38bdf8;
                --bg: #030712;
            }
            body {
                margin: 0;
                background-color: var(--bg);
                color: white;
                font-family: "Inter", system-ui, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }
            .card {
                text-align: center;
                padding: 4rem 2rem;
                border-radius: 1.5rem;
                background: linear-gradient(
                    145deg,
                    rgba(255, 255, 255, 0.03) 0%,
                    rgba(255, 255, 255, 0.01) 100%
                );
                border: 1px solid rgba(255, 255, 255, 0.08);
                backdrop-filter: blur(12px);
                max-width: 650px; /* Widened to accommodate the mission statement */
                width: 90%;
            }
            .logo {
                max-width: 120px;
                margin-bottom: 2.5rem;
                filter: drop-shadow(0 0 20px rgba(56, 189, 248, 0.15));
            }
            .tagline {
                text-transform: uppercase;
                letter-spacing: 0.4em;
                font-size: 0.7rem;
                color: var(--accent);
                font-weight: 700;
                margin-bottom: 1.5rem;
                display: block;
            }
            h1 {
                font-size: 2.5rem;
                margin: 0;
                letter-spacing: -0.02em;
                background: linear-gradient(to bottom, #fff 50%, #94a3b8);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            .mission {
                color: #94a3b8;
                line-height: 1.8;
                margin-top: 2rem;
                font-size: 1.1rem;
                font-weight: 400;
                text-align: center;
            }
            .highlight {
                color: white;
                font-weight: 500;
            }
            .footer-tag {
                margin-top: 3rem;
                font-family: monospace;
                font-size: 0.75rem;
                color: #475569;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <span class="tagline">Governance that disappears</span>
            <img src="assets/logo.svg" alt="Equira Labs Logo" class="logo" />
            <h1>Equira Labs</h1>

            <p class="mission">
                Our mission is to make powerful AI systems
                <span class="highlight">trustworthy by design</span>—aligning
                them with human intent through invisible, scalable governance
                that enables confident adoption across enterprises and society.
            </p>

            <div class="footer-tag">// SECURING_THE_SYNTHETIC_FRONTIER</div>
        </div>
    </body>
</html>
