<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Equira Labs | Trustworthy AI</title>
        <style>
            /* Warm Theme Palette */
            :root {
                --accent: #d97706; /* Warm Amber */
                --bg: #292524; /* Deep Stone/Espresso */
                --text: #f5f5f4; /* Soft Warm White */
                --card-bg: #44403c; /* Muted warm grey-brown */
                --card-border: rgba(255, 255, 255, 0.05);
                --mission-text: #d6d3d1;
            }
            [data-theme="light"] {
                --accent: #b45309; /* Deeper Amber */
                --bg: #fdf6e3; /* Warm Solarized Cream */
                --text: #57534e; /* Soft Coffee Text */
                --card-bg: #ffffff;
                --card-border: rgba(0, 0, 0, 0.05);
                --mission-text: #78716c;
            }
            body {
                margin: 0;
                background-color: var(--bg);
                color: var(--text);
                font-family: "Inter", system-ui, sans-serif;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                padding: 1rem;
                transition:
                    background-color 0.4s,
                    color 0.4s;
            }
            .header-nav {
                position: absolute;
                top: 1rem;
                right: 1rem;
                z-index: 100;
            }
            .theme-toggle {
                background: none;
                border: 1px solid var(--accent);
                color: var(--accent);
                padding: 0.5rem 1rem;
                border-radius: 0.5rem;
                cursor: pointer;
                font-size: 1.2rem;
            }
            .card {
                text-align: center;
                padding: 4rem 2rem;
                border-radius: 1.5rem;
                background: var(--card-bg);
                border: 1px solid var(--card-border);
                backdrop-filter: blur(12px);
                max-width: 650px;
                width: 100%;
                transition: all 0.5s ease;
            }
            .logo,
            .mission,
            .tagline {
                transition: all 0.5s ease;
            }
            .card.active-state .logo,
            .card.active-state .mission,
            .card.active-state .tagline {
                opacity: 0.3;
                transform: scale(0.95);
            }
            .logo {
                max-width: 120px;
                margin-bottom: 2.5rem;
            }
            .tagline {
                text-transform: uppercase;
                letter-spacing: 0.4em;
                font-size: 0.7rem;
                color: var(--accent);
                font-weight: 700;
                margin-bottom: 1.5rem;
                display: block;
            }
            h1 {
                font-size: 2.5rem;
                margin: 0;
                letter-spacing: -0.02em;
                background: linear-gradient(
                    to bottom,
                    var(--text) 50%,
                    var(--mission-text)
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            .mission {
                color: var(--mission-text);
                line-height: 1.8;
                margin-top: 2rem;
                font-size: 1.1rem;
                font-weight: 400;
                text-align: center;
            }
            .highlight {
                color: var(--text);
                font-weight: 500;
            }
            .footer-tag {
                margin-top: 3rem;
                font-family: monospace;
                font-size: 0.75rem;
                color: #a8a29e;
            }
            .upload-btn {
                margin-top: 2rem;
                padding: 0.75rem 1.5rem;
                background: transparent;
                border: 1px solid var(--accent);
                color: var(--accent);
                border-radius: 0.5rem;
                cursor: pointer;
                font-family: inherit;
                font-size: 0.9rem;
                transition: all 0.2s;
                display: inline-block;
            }
            .upload-btn:hover {
                background: var(--accent);
                color: white;
            }
            #statusArea {
                margin-top: 2rem;
                color: var(--text);
                font-size: 1.2rem;
                font-weight: 500;
                min-height: 1.5em;
            }
            .progress-container {
                width: 100%;
                height: 6px;
                background: rgba(100, 100, 100, 0.1);
                border-radius: 3px;
                margin-top: 1rem;
                overflow: hidden;
                display: none;
            }
            .progress-bar {
                height: 100%;
                background: var(--accent);
                width: 0%;
                transition: width 0.3s ease;
            }
        </style>
    </head>
    <body>
        <div class="header-nav">
            <button id="themeToggle" class="theme-toggle">☀️</button>
        </div>
        <div class="card" id="mainCard">
            <span class="tagline">Governance that disappears</span>
            <img src="assets/logo.svg" alt="Equira Labs Logo" class="logo" />
            <h1>Equira Labs</h1>
            <p class="mission">
                Our mission is to make powerful AI systems
                <span class="highlight">trustworthy by design</span>—aligning
                them with human intent through invisible, scalable governance
                that enables confident adoption across enterprises and society.
            </p>
            <button class="upload-btn" id="uploadBtn">Try it Out!</button>
            <input
                type="file"
                id="fileInput"
                style="display: none"
                accept="image/*,video/*"
            />
            <div id="statusArea"></div>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="footer-tag">// SECURING_THE_SYNTHETIC_FRONTIER</div>
        </div>
        <script>
            const LOG_PREFIX = "[Equira UI]";
            const themeToggle = document.getElementById("themeToggle");
            themeToggle.addEventListener("click", () => {
                document.body.dataset.theme =
                    document.body.dataset.theme === "light" ? "dark" : "light";
                themeToggle.innerText =
                    document.body.dataset.theme === "light" ? "🌙" : "☀️";
            });

            const BASE_URL = "https://odylic-oscillatory-darron.ngrok-free.dev";
            const uploadBtn = document.getElementById("uploadBtn");
            const fileInput = document.getElementById("fileInput");
            const statusArea = document.getElementById("statusArea");
            const mainCard = document.getElementById("mainCard");
            const progressContainer =
                document.getElementById("progressContainer");
            const progressBar = document.getElementById("progressBar");

            uploadBtn.addEventListener("click", () => fileInput.click());

            fileInput.addEventListener("change", async (e) => {
                const file = e.target.files[0];
                if (!file) {
                    console.warn(`${LOG_PREFIX} No file selected.`);
                    return;
                }
                console.log(
                    `${LOG_PREFIX} Starting workflow for file: ${file.name} (${file.size} bytes)`,
                );

                try {
                    setState("UPLOADING", "Initializing upload...");

                    const initRes = await fetch(`${BASE_URL}/analyze`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            filename: file.name,
                            size: file.size,
                        }),
                    });

                    if (!initRes.ok)
                        throw new Error(
                            `Initialization failed: ${initRes.status}`,
                        );

                    const { submission_id } = await initRes.json();
                    console.log(
                        `${LOG_PREFIX} Upload initialized. ID: ${submission_id}`,
                    );

                    const CHUNK_SIZE = 5 * 1024 * 1024; // 5MB
                    const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
                    progressContainer.style.display = "block";

                    for (let i = 0; i < totalChunks; i++) {
                        setState(
                            "UPLOADING",
                            `Uploading chunk ${i + 1} of ${totalChunks}...`,
                        );
                        const start = i * CHUNK_SIZE;
                        const end = Math.min(start + CHUNK_SIZE, file.size);
                        const chunk = file.slice(start, end);

                        const chunkRes = await fetch(
                            `${BASE_URL}/analyze/${submission_id}/chunk`,
                            {
                                method: "PUT",
                                headers: {
                                    "Content-Type": "application/octet-stream",
                                    "X-Chunk-Index": i.toString(),
                                },
                                body: chunk,
                            },
                        );

                        if (!chunkRes.ok)
                            throw new Error(
                                `Chunk ${i} upload failed: ${chunkRes.status}`,
                            );

                        const percent = ((i + 1) / totalChunks) * 100;
                        progressBar.style.width = `${percent}%`;
                    }

                    console.log(`${LOG_PREFIX} Upload complete. Finalizing...`);
                    setState("PROCESSING", "Analyzing...");
                    progressContainer.style.display = "none";

                    const finalizeRes = await fetch(
                        `${BASE_URL}/analyze/${submission_id}/complete`,
                        { method: "POST" },
                    );
                    if (!finalizeRes.ok)
                        throw new Error(
                            `Finalization failed: ${finalizeRes.status}`,
                        );

                    pollResults(submission_id);
                } catch (err) {
                    console.error(`${LOG_PREFIX} Workflow error:`, err);
                    progressContainer.style.display = "none";
                    setState("IDLE", "Error: " + err.message);
                }
            });

            function setState(newState, message) {
                statusArea.innerText = message;
                if (newState !== "IDLE") {
                    mainCard.classList.add("active-state");
                    uploadBtn.style.display = "none";
                } else {
                    mainCard.classList.remove("active-state");
                    uploadBtn.style.display = "inline-block";
                }
            }

            async function pollResults(guid) {
                console.log(`${LOG_PREFIX} Polling started for ID: ${guid}`);
                let attempts = 0;
                let currentInterval = 2000;
                const MAX_INTERVAL = 10000;
                const MAX_ATTEMPTS = 15; // Increased slightly for slower processing

                async function check() {
                    try {
                        const res = await fetch(`${BASE_URL}/results/${guid}`);
                        if (!res.ok)
                            throw new Error("Server error: " + res.status);

                        const data = await res.json();
                        attempts++;
                        console.log(
                            `${LOG_PREFIX} Polling attempt ${attempts}, status: ${data.status}`,
                        );

                        if (data.status === "COMPLETED") {
                            console.log(`${LOG_PREFIX} Analysis complete.`);
                            setState(
                                "COMPLETED",
                                "Analysis Complete: " +
                                    (data.findings || "Safe."),
                            );
                        } else if (data.status === "FAILED") {
                            console.error(
                                `${LOG_PREFIX} Analysis failed from backend: ${data.findings}`,
                            );
                            setState(
                                "IDLE",
                                "Analysis Failed: " +
                                    (data.findings || "Unknown error"),
                            );
                        } else if (attempts >= MAX_ATTEMPTS) {
                            console.warn(
                                `${LOG_PREFIX} Analysis timed out after ${MAX_ATTEMPTS} attempts.`,
                            );
                            setState("IDLE", "Failed: Analysis timed out.");
                        } else {
                            statusArea.innerText = `Processing: ${data.status} (Attempt ${attempts})`;
                            currentInterval = Math.min(
                                currentInterval * 1.5,
                                MAX_INTERVAL,
                            );
                            setTimeout(check, currentInterval);
                        }
                    } catch (err) {
                        console.error(`${LOG_PREFIX} Polling error:`, err);
                        setState("IDLE", "Polling Error: " + err.message);
                    }
                }
                check();
            }
        </script>
    </body>
</html>
